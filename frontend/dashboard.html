<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ReZoom AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode dashboard-layout">
    
    <aside class="sidebar glass-panel">
        <div class="logo-mark"><i data-lucide="file-text" style="color: var(--primary);"></i></div>
        <button class="nav-icon active"><i data-lucide="edit-3"></i></button>
        <button class="nav-icon"><i data-lucide="briefcase"></i></button>
        <button class="nav-icon"><i data-lucide="download"></i></button>
        
        <div class="spacer"></div>
        
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
            <i data-lucide="sun" id="theme-icon"></i>
        </button>
    </aside>

    <main class="center-panel glass-panel">
        <h2 style="margin-bottom: 30px; font-size: 2rem;">Resume Builder</h2>
        
        <div class="form-group">
            <label>Upload Existing PDF</label>
            <input type="file" id="pdf-upload" accept=".pdf" class="file-input">
        </div>

        <form id="resume-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Jane Doe">
            </div>
            <div class="form-group">
                <label>Skills (comma separated)</label>
                <textarea id="skills" rows="4" placeholder="Python, React, Data Analysis..."></textarea>
            </div>
            <div class="form-group">
                <label>Target Job Description</label>
                <textarea id="job-desc" rows="8" placeholder="Paste the job description here to enable AI matching..."></textarea>
            </div>
        </form>
    </main>

    <aside class="right-panel glass-panel">
        <h3 style="margin-bottom: 20px; font-size: 1.5rem;">AI Analysis</h3>
        
        <div class="score-card">
            <div class="score-circle" id="match-score">--%</div>
            <p style="margin-bottom: 20px; color: var(--text-muted);">Match Score</p>
            <button id="analyze-btn" class="btn-primary" style="width: 100%;">Analyze Fit</button>
        </div>

        <div class="suggestions-container" id="suggestions-box" style="margin-top: 30px;">
            <h4 style="margin-bottom: 10px;">Missing Keywords</h4>
            <ul id="missing-keywords" class="keyword-list">
                </ul>
        </div>
    </aside>

    <script type="module" src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
